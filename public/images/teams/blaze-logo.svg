<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="blaze-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="bg-grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg-grad3)" stroke="url(#blaze-grad)" stroke-width="3"/>
  <!-- Lightning bolt -->
  <g filter="url(#glow3)">
    <path d="M115 30 L75 95 L95 95 L85 170 L125 105 L105 105 Z" 
          fill="url(#blaze-grad)"/>
    <!-- Highlight -->
    <path d="M110 45 L85 90 L100 90 L92 145 L120 100 L105 100 Z" 
          fill="#fbbf24" opacity="0.5"/>
  </g>
  <!-- Spark effects -->
  <circle cx="60" cy="70" r="4" fill="#fff" opacity="0.6"/>
  <circle cx="140" cy="130" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="55" cy="130" r="2" fill="#fff" opacity="0.4"/>
</svg>
