<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="valorant-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4655"/>
      <stop offset="50%" stop-color="#bd3944"/>
      <stop offset="100%" stop-color="#0f1923"/>
    </linearGradient>
    <linearGradient id="valorant-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4655"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <filter id="glow-v">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="200" fill="url(#valorant-bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- VALORANT Logo stylized -->
  <g filter="url(#glow-v)" transform="translate(150, 50)">
    <!-- V shape -->
    <path d="M50 0 L25 100 L0 0 L15 0 L25 70 L35 0 Z" fill="url(#valorant-accent)"/>
    <!-- Crosshair -->
    <circle cx="50" cy="50" r="30" fill="none" stroke="#ff4655" stroke-width="2" opacity="0.5"/>
    <line x1="50" y1="15" x2="50" y2="35" stroke="#ff4655" stroke-width="2"/>
    <line x1="50" y1="65" x2="50" y2="85" stroke="#ff4655" stroke-width="2"/>
    <line x1="15" y1="50" x2="35" y2="50" stroke="#ff4655" stroke-width="2"/>
    <line x1="65" y1="50" x2="85" y2="50" stroke="#ff4655" stroke-width="2"/>
  </g>
  <!-- Decorative elements -->
  <polygon points="0,200 0,180 30,200" fill="#ff4655" opacity="0.5"/>
  <polygon points="400,0 400,30 370,0" fill="#ff4655" opacity="0.5"/>
</svg>
