<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="ff-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="ff-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow-ff">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="200" fill="url(#ff-bg)"/>
  <!-- Fire particles -->
  <g opacity="0.2">
    <circle cx="50" cy="150" r="8" fill="#fbbf24"/>
    <circle cx="100" cy="180" r="5" fill="#f97316"/>
    <circle cx="350" cy="30" r="6" fill="#fbbf24"/>
    <circle cx="300" cy="50" r="4" fill="#ef4444"/>
    <circle cx="380" cy="170" r="7" fill="#f97316"/>
  </g>
  <!-- Free Fire flames -->
  <g filter="url(#glow-ff)" transform="translate(150, 30)">
    <!-- Main flame -->
    <path d="M50 140 C20 100, 30 60, 50 20 C60 40, 55 60, 70 50 C65 70, 80 100, 50 140 Z" fill="url(#ff-accent)"/>
    <!-- Inner flame -->
    <path d="M50 130 C35 100, 40 70, 50 40 C55 55, 52 70, 60 65 C58 80, 65 100, 50 130 Z" fill="#fbbf24" opacity="0.8"/>
    <!-- Core -->
    <ellipse cx="50" cy="110" rx="12" ry="20" fill="#fff" opacity="0.6"/>
  </g>
  <!-- Corner flames -->
  <path d="M0 200 Q20 180, 0 160 Q30 170, 40 200 Z" fill="#f97316" opacity="0.5"/>
  <path d="M400 0 Q380 20, 400 40 Q370 30, 360 0 Z" fill="#f97316" opacity="0.5"/>
</svg>
