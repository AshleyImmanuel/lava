<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="cs2-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#de9b35"/>
      <stop offset="50%" stop-color="#8b5a2b"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="cs2-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#de9b35"/>
      <stop offset="100%" stop-color="#f4c430"/>
    </linearGradient>
    <filter id="glow-cs">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="200" fill="url(#cs2-bg)"/>
  <!-- Crosshair pattern -->
  <g opacity="0.1">
    <circle cx="200" cy="100" r="80" fill="none" stroke="#fff" stroke-width="1"/>
    <circle cx="200" cy="100" r="50" fill="none" stroke="#fff" stroke-width="1"/>
    <circle cx="200" cy="100" r="20" fill="none" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- CS2 Stylized elements -->
  <g filter="url(#glow-cs)" transform="translate(140, 40)">
    <!-- Shield/Badge shape -->
    <path d="M60 0 L120 30 L120 80 L60 120 L0 80 L0 30 Z" fill="none" stroke="url(#cs2-accent)" stroke-width="3"/>
    <!-- 2 in center -->
    <text x="60" y="75" font-family="Arial Black" font-size="50" fill="url(#cs2-accent)" text-anchor="middle">2</text>
  </g>
  <!-- Bullet trail effects -->
  <g opacity="0.3">
    <line x1="0" y1="50" x2="80" y2="80" stroke="#de9b35" stroke-width="2"/>
    <line x1="400" y1="150" x2="320" y2="120" stroke="#de9b35" stroke-width="2"/>
  </g>
  <!-- Corner accents -->
  <polygon points="0,0 40,0 0,40" fill="#de9b35" opacity="0.4"/>
  <polygon points="400,200 360,200 400,160" fill="#de9b35" opacity="0.4"/>
</svg>
